name: Monitor procurement notices

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      test_notify:
        description: "Send a PushPlus test notification"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: monitor-procurement-notices
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run monitor
        id: monitor
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: |
          set +e
          if [ "${{ github.event.inputs.test_notify }}" = "true" ]; then
            python outputs/monitor_swueecg_changjiang.py --test-notify
          else
            python outputs/monitor_swueecg_changjiang.py
          fi
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" = "1" ]; then
            exit 1
          fi
          exit 0

      - name: Persist updated state
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- outputs/monitor_swueecg_changjiang.state.json; then
            git add outputs/monitor_swueecg_changjiang.state.json
            git commit -m "Update monitor state"
            git push
          fi
